<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vrolijke K3 Sterrenschieter met Unicorns en Hartjes</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #ff8bd1, #ffd166, #7bdff2);
      min-height: 100vh;
      overflow: hidden;
      color: white;
      text-align: center;
      user-select: none;
      cursor: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      cursor: none;
    }

    .card {
      position: relative;
      z-index: 1;
      margin: 8vh auto 0;
      max-width: 820px;
      padding: 30px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      pointer-events: none;
    }

    h1 {
      font-size: clamp(2.2rem, 7vw, 4.8rem);
      margin: 0;
      text-shadow: 0 5px 18px rgba(0,0,0,0.25);
    }

    p {
      font-size: clamp(1rem, 3vw, 1.35rem);
      margin: 14px 0 18px;
    }

    .score {
      display: inline-flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 8px;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.28);
      font-size: 1.1rem;
      font-weight: 800;
      text-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .note {
      margin-top: 14px;
      font-size: 0.95rem;
      opacity: 0.95;
    }

    .rainbow-title {
      background: linear-gradient(90deg, #ff004c, #ff9f1c, #fff200, #2ec4b6, #3a86ff, #8338ec, #ff006e);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: rainbowText 3s linear infinite;
      filter: drop-shadow(0 5px 14px rgba(0,0,0,.22));
    }

    @keyframes rainbowText {
      from { background-position: 0% 50%; }
      to { background-position: 300% 50%; }
    }

    .wand-cursor {
      position: fixed;
      left: 0;
      top: 0;
      width: 110px;
      height: 110px;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-999px, -999px) rotate(-25deg);
      transform-origin: 22px 88px;
      filter: drop-shadow(0 0 14px rgba(255,255,255,0.65)) drop-shadow(0 0 24px rgba(255,100,200,0.35));
    }

    .wand-star {
      position: absolute;
      left: 10px;
      top: 2px;
      width: 42px;
      height: 42px;
      background: radial-gradient(circle at 35% 35%, #ffffff 0 18%, #fff7a6 19% 35%, #ffd166 36% 65%, #ff4fb8 66% 100%);
      clip-path: polygon(50% 0%, 61% 34%, 98% 35%, 68% 57%, 79% 92%, 50% 71%, 21% 92%, 32% 57%, 2% 35%, 39% 34%);
      animation: twinkle 1.2s ease-in-out infinite alternate;
    }

    .wand-core {
      position: absolute;
      left: 25px;
      top: 30px;
      width: 12px;
      height: 72px;
      border-radius: 999px;
      background: linear-gradient(180deg, #fff8c9 0%, #f8a9db 18%, #d96adb 42%, #9b5de5 100%);
      box-shadow: inset 0 0 4px rgba(255,255,255,0.7);
    }

    .wand-ribbon {
      position: absolute;
      left: 18px;
      top: 44px;
      width: 28px;
      height: 18px;
      border-radius: 50%;
      border: 4px solid #ffffff;
      border-top-color: transparent;
      border-right-color: #7bdff2;
      border-left-color: #ff8bd1;
      border-bottom-color: #ffe066;
      opacity: 0.9;
      transform: rotate(25deg);
    }

    .wand-sparkle {
      position: absolute;
      width: 10px;
      height: 10px;
      background: white;
      opacity: 0.9;
      clip-path: polygon(50% 0%, 61% 39%, 100% 50%, 61% 61%, 50% 100%, 39% 61%, 0% 50%, 39% 39%);
      animation: floatSparkle 1.3s ease-in-out infinite;
    }

    .wand-sparkle.s1 { left: 44px; top: 2px; transform: scale(1); }
    .wand-sparkle.s2 { left: 52px; top: 18px; transform: scale(.65); animation-delay: .3s; }
    .wand-sparkle.s3 { left: -2px; top: 18px; transform: scale(.7); animation-delay: .5s; }

    @keyframes twinkle {
      from { transform: scale(0.96) rotate(0deg); }
      to { transform: scale(1.08) rotate(10deg); }
    }

    @keyframes floatSparkle {
      0%   { transform: translateY(0) scale(.7); opacity: .2; }
      50%  { transform: translateY(-8px) scale(1); opacity: 1; }
      100% { transform: translateY(-2px) scale(.8); opacity: .4; }
    }

    @media (pointer: coarse) {
      body, canvas { cursor: auto; }
      .wand-cursor { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="wand-cursor" id="wandCursor" aria-hidden="true">
    <div class="wand-star"></div>
    <div class="wand-core"></div>
    <div class="wand-ribbon"></div>
    <div class="wand-sparkle s1"></div>
    <div class="wand-sparkle s2"></div>
    <div class="wand-sparkle s3"></div>
  </div>

  <main class="card">
    <h1 class="rainbow-title">Sterren schieten!</h1>
    <p>Schiet sterren, unicorns én hartjes af. Unicorns geven regenbogen, en hartjes laten zand uitstuiven.</p>
    <div class="score">
      <span>⭐ Score: <span id="score">0</span></span>
      <span>🌈 Combo: <span id="combo">0</span></span>
    </div>
    <div class="note">Nieuw: hartjes op het speelveld. Raak ze met de toverstaf voor een zand-effect 🤎</div>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const comboEl = document.getElementById("combo");
    const wandCursor = document.getElementById("wandCursor");

    let width, height;
    let stars = [];
    let hearts = [];
    let unicorns = [];
    let sparkles = [];
    let trails = [];
    let rainbows = [];
    let sandBursts = [];
    let score = 0;
    let combo = 0;
    let lastHit = 0;
    let pointerDown = false;

    const rainbow = ["#ff004c", "#ff9f1c", "#fff200", "#2ec4b6", "#3a86ff", "#8338ec", "#ff006e"];
    const softColors = ["#ffffff", "#ff4fb8", "#ffe066", "#6ee7ff", "#b8ff6e", "#ff8a5c"];
    const sandColors = ["#ff2d55", "#ff3b30", "#ff1744", "#d50000", "#ff6b6b"];

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resize);
    resize();

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function makeStar(x = random(40, width - 40), y = random(60, height - 40)) {
      return {
        x, y,
        vx: random(-1.2, 1.2),
        vy: random(-0.8, 1.4),
        r: random(15, 28),
        rotation: random(0, Math.PI * 2),
        spin: random(-0.05, 0.05),
        hueOffset: Math.floor(random(0, rainbow.length)),
        pulse: random(0, Math.PI * 2)
      };
    }

    function makeHeart() {
      return {
        x: random(50, width - 50),
        y: random(height * 0.45, height - 70),
        size: random(40, 70),
        rotation: random(-0.25, 0.25),
        pulse: random(0, Math.PI * 2),
        drift: random(-0.35, 0.35),
        color: ["#ff4fb8", "#ff6fa8", "#ff85c2", "#ff5fa2"][Math.floor(random(0, 4))]
      };
    }

    function makeUnicorn() {
      return {
        x: random(-200, width + 100),
        y: random(90, height * 0.65),
        scale: random(0.8, 1.35),
        speed: random(0.6, 1.6),
        bob: random(0, Math.PI * 2),
        bobSpeed: random(0.015, 0.035),
        rainbowOffset: Math.floor(random(0, rainbow.length)),
        flip: Math.random() > 0.5 ? 1 : -1
      };
    }

    function respawnUnicorn(u) {
      u.scale = random(0.8, 1.35);
      u.speed = random(0.6, 1.6);
      u.bob = random(0, Math.PI * 2);
      u.bobSpeed = random(0.015, 0.035);
      u.rainbowOffset = Math.floor(random(0, rainbow.length));
      u.flip = Math.random() > 0.5 ? 1 : -1;
      u.y = random(90, height * 0.65);
      u.x = u.flip === 1 ? -180 : width + 180;
    }

    for (let i = 0; i < 16; i++) stars.push(makeStar());
    for (let i = 0; i < 18; i++) hearts.push(makeHeart());
    for (let i = 0; i < 5; i++) unicorns.push(makeUnicorn());

    function drawStarShape(x, y, r, rotation, fillStyle) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotation);
      ctx.fillStyle = fillStyle;
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const radius = i % 2 === 0 ? r : r / 2.25;
        const angle = -Math.PI / 2 + (Math.PI * 2 * i) / 10;
        ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawHeart(x, y, size, color, rotation = 0, alpha = 1) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotation);
      ctx.scale(size / 20, size / 20);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, 6);
      ctx.bezierCurveTo(-20, -8, -10, -24, 0, -12);
      ctx.bezierCurveTo(10, -24, 20, -8, 0, 6);
      ctx.fill();
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    function rainbowGradient(x, y, r, offset) {
      const grad = ctx.createRadialGradient(x - r / 3, y - r / 3, 2, x, y, r * 1.4);
      for (let i = 0; i < rainbow.length; i++) {
        grad.addColorStop(i / (rainbow.length - 1), rainbow[(i + offset) % rainbow.length]);
      }
      return grad;
    }

    function makeSparkle(x, y, size = random(3, 7), speed = random(2, 7)) {
      const angle = random(0, Math.PI * 2);
      return {
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size,
        life: 1,
        decay: random(0.012, 0.028),
        color: rainbow[Math.floor(random(0, rainbow.length))],
        rotation: random(0, Math.PI * 2),
        spin: random(-0.14, 0.14),
        shape: Math.random() > 0.45 ? "star" : "heart"
      };
    }

    function makeSandParticle(x, y) {
      const angle = random(-Math.PI * 0.92, -Math.PI * 0.08);
      const speed = random(2.2, 9.2);
      return {
        x, y,
        vx: Math.cos(angle) * speed * 0.9,
        vy: Math.sin(angle) * speed * 0.75,
        size: random(2.5, 6.5),
        life: 1,
        decay: random(0.005, 0.013),
        color: sandColors[Math.floor(random(0, sandColors.length))],
        spin: random(-0.06, 0.06),
        rotation: random(0, Math.PI * 2)
      };
    }

    function explode(x, y) {
      for (let i = 0; i < 42; i++) {
        sparkles.push(makeSparkle(x, y, random(3, 8), random(2, 8)));
      }
      for (let i = 0; i < 9; i++) {
        trails.push({
          x, y,
          angle: random(0, Math.PI * 2),
          length: random(80, 190),
          width: random(10, 22),
          life: 1,
          colorA: rainbow[i % rainbow.length],
          colorB: rainbow[(i + 3) % rainbow.length]
        });
      }
    }

    function spawnRainbow(x, y, scale = 1) {
      rainbows.push({
        x, y,
        scale,
        life: 1,
        grow: 0.02 + Math.random() * 0.02
      });

      for (let i = 0; i < 30; i++) {
        sparkles.push(makeSparkle(x + random(-40, 40), y + random(-30, 30), random(3, 8), random(2, 6)));
      }
    }

    function spawnSand(x, y, scale = 1) {
      sandBursts.push({
        x,
        y,
        radius: 20 * scale,
        life: 1,
        grow: 3.2 + scale * 1.2
      });

      const count = Math.floor(110 * scale);
      for (let i = 0; i < count; i++) {
        sandBursts.push(makeSandParticle(x + random(-10, 10), y + random(-4, 4)));
      }
    }

    function addPointerTrail(x, y, burst = false) {
      trails.push({
        x, y,
        angle: random(0, Math.PI * 2),
        length: random(burst ? 50 : 25, burst ? 120 : 70),
        width: random(burst ? 8 : 5, burst ? 18 : 12),
        life: burst ? 0.9 : 0.65,
        colorA: rainbow[Math.floor(random(0, rainbow.length))],
        colorB: rainbow[Math.floor(random(0, rainbow.length))]
      });
    }

    function getUnicornCenter(u) {
      return { x: u.x, y: u.y + Math.sin(u.bob) * 12 };
    }

    function isPointInsideEllipse(px, py, cx, cy, rx, ry) {
      const dx = (px - cx) / rx;
      const dy = (py - cy) / ry;
      return dx * dx + dy * dy <= 1;
    }

    function hitTestUnicorn(u, x, y) {
      const c = getUnicornCenter(u);
      const lx = (x - c.x) * u.flip;
      const ly = y - c.y;
      const s = u.scale;

      const hitBody = isPointInsideEllipse(lx, ly, 0, 0, 30 * s, 22 * s);
      const hitHead = isPointInsideEllipse(lx, ly, 28 * s, -18 * s, 16 * s, 14 * s);
      const hitWing = isPointInsideEllipse(lx, ly, -18 * s, -8 * s, 16 * s, 18 * s);

      return hitBody || hitHead || hitWing;
    }

    function hitTestHeart(h, x, y) {
      const dx = x - h.x;
      const dy = y - h.y;
      const distance = Math.hypot(dx, dy);
      return distance < h.size * 0.95;
    }

    function registerHit(points) {
      const now = performance.now();
      combo = now - lastHit < 900 ? combo + 1 : 1;
      lastHit = now;
      score += points + combo * 2;
      scoreEl.textContent = score;
      comboEl.textContent = combo;
    }

    function shootAt(x, y) {
      let hitSomething = false;

      for (let i = unicorns.length - 1; i >= 0; i--) {
        const u = unicorns[i];
        if (hitTestUnicorn(u, x, y)) {
          hitSomething = true;
          const c = getUnicornCenter(u);
          explode(c.x, c.y);
          spawnRainbow(c.x, c.y + 10, 0.9 + u.scale * 0.35);
          registerHit(25);
          respawnUnicorn(u);
          break;
        }
      }

      if (!hitSomething) {
        for (let i = hearts.length - 1; i >= 0; i--) {
          const h = hearts[i];
          if (hitTestHeart(h, x, y)) {
            hitSomething = true;
            spawnSand(h.x, h.y + 6, h.size / 30);
            registerHit(15);
            hearts[i] = makeHeart();
            break;
          }
        }
      }

      if (!hitSomething) {
        for (let i = stars.length - 1; i >= 0; i--) {
          const s = stars[i];
          const dx = x - s.x;
          const dy = y - s.y;
          const distance = Math.hypot(dx, dy);

          if (distance < s.r * 1.45) {
            hitSomething = true;
            stars.splice(i, 1);
            explode(s.x, s.y);
            stars.push(makeStar(random(40, width - 40), -40));
            registerHit(10);
            break;
          }
        }
      }

      if (!hitSomething) {
        for (let i = 0; i < 14; i++) {
          sparkles.push(makeSparkle(x, y, random(2, 5), random(1, 4)));
        }
      }
    }

    function pointerPosition(event) {
      const rect = canvas.getBoundingClientRect();
      const p = event.touches ? event.touches[0] : event;
      return {
        x: p.clientX - rect.left,
        y: p.clientY - rect.top
      };
    }

    function moveWand(clientX, clientY) {
      const left = clientX - 18;
      const top = clientY - 14;
      wandCursor.style.transform = `translate(${left}px, ${top}px) rotate(-25deg)`;
    }

    window.addEventListener("pointermove", event => {
      moveWand(event.clientX, event.clientY);

      if (!pointerDown) return;
      const p = pointerPosition(event);
      addPointerTrail(p.x, p.y);
      if (Math.random() > 0.72) shootAt(p.x, p.y);
    });

    window.addEventListener("pointerdown", event => {
      pointerDown = true;
      moveWand(event.clientX, event.clientY);
      const p = pointerPosition(event);
      shootAt(p.x, p.y);
      addPointerTrail(p.x, p.y, true);
    });

    window.addEventListener("pointerup", () => pointerDown = false);
    window.addEventListener("mouseleave", () => {
      wandCursor.style.transform = "translate(-999px, -999px) rotate(-25deg)";
    });

    function drawUnicorn(u) {
      const c = getUnicornCenter(u);
      const x = c.x;
      const y = c.y;
      const s = u.scale;

      ctx.save();
      ctx.globalAlpha = 0.42;
      for (let i = 0; i < rainbow.length; i++) {
        ctx.strokeStyle = rainbow[(i + u.rainbowOffset) % rainbow.length];
        ctx.lineWidth = 4.5 * s;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(x - 28 * s * u.flip, y + (i - 3) * 3.4 * s);
        ctx.lineTo(x - 120 * s * u.flip, y + (i - 3) * 3.4 * s + Math.sin(u.bob + i) * 5);
        ctx.stroke();
      }
      ctx.restore();

      ctx.save();
      ctx.translate(x, y);
      ctx.scale(u.flip, 1);

      ctx.shadowBlur = 24;
      ctx.shadowColor = "rgba(255,255,255,0.45)";

      ctx.fillStyle = "rgba(255,255,255,0.95)";
      ctx.beginPath();
      ctx.ellipse(0, 0, 28 * s, 19 * s, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.ellipse(28 * s, -18 * s, 14 * s, 12 * s, -0.15, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.moveTo(24 * s, -30 * s);
      ctx.lineTo(29 * s, -42 * s);
      ctx.lineTo(34 * s, -30 * s);
      ctx.closePath();
      ctx.fill();

      const hornGrad = ctx.createLinearGradient(30 * s, -38 * s, 42 * s, -22 * s);
      hornGrad.addColorStop(0, "#fff7a6");
      hornGrad.addColorStop(0.4, "#ff8bd1");
      hornGrad.addColorStop(0.75, "#7bdff2");
      hornGrad.addColorStop(1, "#9b5de5");
      ctx.fillStyle = hornGrad;
      ctx.beginPath();
      ctx.moveTo(31 * s, -36 * s);
      ctx.lineTo(45 * s, -24 * s);
      ctx.lineTo(30 * s, -24 * s);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = "#ff66c4";
      ctx.lineWidth = 6 * s;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(16 * s, -21 * s);
      ctx.quadraticCurveTo(8 * s, -40 * s, -2 * s, -18 * s);
      ctx.stroke();

      ctx.strokeStyle = "#7bdff2";
      ctx.beginPath();
      ctx.moveTo(20 * s, -17 * s);
      ctx.quadraticCurveTo(12 * s, -34 * s, 3 * s, -14 * s);
      ctx.stroke();

      ctx.strokeStyle = "#ffe066";
      ctx.beginPath();
      ctx.moveTo(24 * s, -14 * s);
      ctx.quadraticCurveTo(18 * s, -28 * s, 8 * s, -9 * s);
      ctx.stroke();

      ctx.strokeStyle = "#ff66c4";
      ctx.lineWidth = 7 * s;
      ctx.beginPath();
      ctx.moveTo(-26 * s, -2 * s);
      ctx.quadraticCurveTo(-44 * s, 6 * s, -36 * s, 24 * s);
      ctx.stroke();
      ctx.strokeStyle = "#7bdff2";
      ctx.beginPath();
      ctx.moveTo(-24 * s, 1 * s);
      ctx.quadraticCurveTo(-43 * s, 14 * s, -33 * s, 27 * s);
      ctx.stroke();
      ctx.strokeStyle = "#ffe066";
      ctx.beginPath();
      ctx.moveTo(-22 * s, 4 * s);
      ctx.quadraticCurveTo(-41 * s, 18 * s, -29 * s, 31 * s);
      ctx.stroke();

      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 7 * s;
      ctx.beginPath();
      ctx.moveTo(-12 * s, 12 * s);
      ctx.lineTo(-13 * s, 34 * s + Math.sin(u.bob * 2) * 2);
      ctx.moveTo(4 * s, 12 * s);
      ctx.lineTo(3 * s, 35 * s + Math.sin(u.bob * 2 + 1) * 2);
      ctx.moveTo(15 * s, 8 * s);
      ctx.lineTo(16 * s, 30 * s + Math.sin(u.bob * 2 + 2) * 2);
      ctx.stroke();

      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.beginPath();
      ctx.moveTo(-4 * s, -7 * s);
      ctx.quadraticCurveTo(-20 * s, -30 * s, -27 * s, -4 * s);
      ctx.quadraticCurveTo(-16 * s, -8 * s, -8 * s, 3 * s);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#6d3b8c";
      ctx.beginPath();
      ctx.arc(33 * s, -19 * s, 2.2 * s, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,160,190,0.7)";
      ctx.beginPath();
      ctx.arc(36 * s, -13 * s, 3 * s, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;
      for (let i = 0; i < 3; i++) {
        drawStarShape(
          (8 + i * 12) * s,
          (-38 - i * 6 + Math.sin(u.bob + i) * 3) * s,
          (3.5 - i * 0.6) * s,
          performance.now() / 400 + i,
          rainbow[(u.rainbowOffset + i) % rainbow.length]
        );
      }

      ctx.restore();
    }

    function updateAndDrawUnicorns() {
      for (const u of unicorns) {
        u.bob += u.bobSpeed;
        u.x += u.speed * u.flip;

        if (u.flip === 1 && u.x > width + 150) respawnUnicorn(u);
        else if (u.flip === -1 && u.x < -160) respawnUnicorn(u);

        drawUnicorn(u);
      }
    }

    function updateAndDrawHearts() {
      for (const h of hearts) {
        h.pulse += 0.045;
        h.x += h.drift;
        if (h.x < 30 || h.x > width - 30) h.drift *= -1;

        const size = h.size + Math.sin(h.pulse) * 2.2;

        ctx.save();
        ctx.shadowBlur = 18;
        ctx.shadowColor = "rgba(255,105,180,0.55)";
        drawHeart(h.x, h.y, size, h.color, h.rotation + Math.sin(h.pulse) * 0.08, 0.98);
        ctx.restore();

        drawHeart(h.x, h.y - 2, size * 0.55, "rgba(255,255,255,0.35)", h.rotation + Math.sin(h.pulse) * 0.08);
      }
    }

    function updateAndDrawStars() {
      for (const s of stars) {
        s.x += s.vx;
        s.y += s.vy;
        s.rotation += s.spin;
        s.pulse += 0.04;

        if (s.x < 25 || s.x > width - 25) s.vx *= -1;
        if (s.y > height + 40) Object.assign(s, makeStar(random(40, width - 40), -40));
        if (s.y < -80 && s.vy < 0) s.vy *= -1;

        const pulsedRadius = s.r + Math.sin(s.pulse) * 2.5;

        ctx.save();
        ctx.shadowBlur = 20;
        ctx.shadowColor = rainbow[s.hueOffset % rainbow.length];
        drawStarShape(s.x, s.y, pulsedRadius, s.rotation, rainbowGradient(s.x, s.y, pulsedRadius, s.hueOffset));
        ctx.restore();

        drawStarShape(s.x, s.y, pulsedRadius * 0.34, -s.rotation * 0.7, "rgba(255,255,255,0.82)");
      }
    }

    function updateAndDrawRainbows() {
      for (let i = rainbows.length - 1; i >= 0; i--) {
        const r = rainbows[i];
        r.life -= 0.012;
        r.scale += r.grow;

        const alpha = Math.max(0, r.life);
        const baseRadius = 55 * r.scale;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.lineCap = "round";
        ctx.shadowBlur = 12;
        ctx.shadowColor = "rgba(255,255,255,0.45)";

        for (let band = 0; band < rainbow.length; band++) {
          ctx.beginPath();
          ctx.strokeStyle = rainbow[band];
          ctx.lineWidth = 9;
          ctx.arc(r.x, r.y + 30, baseRadius + band * 10, Math.PI, Math.PI * 2);
          ctx.stroke();
        }

        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.beginPath();
        ctx.arc(r.x - baseRadius - 15, r.y + 30, 16, 0, Math.PI * 2);
        ctx.arc(r.x + baseRadius + 15 + (rainbow.length - 1) * 5, r.y + 30, 16, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();

        if (r.life <= 0) rainbows.splice(i, 1);
      }
    }

    function updateAndDrawSand() {
      for (let i = sandBursts.length - 1; i >= 0; i--) {
        const s = sandBursts[i];

        if ('grow' in s) {
          s.life -= 0.018;
          s.radius += s.grow;

          ctx.save();
          ctx.globalAlpha = Math.max(0, s.life) * 0.55;
          const grad = ctx.createRadialGradient(s.x, s.y, 2, s.x, s.y, s.radius);
          grad.addColorStop(0, "rgba(255,40,60,0.98)");
          grad.addColorStop(0.55, "rgba(220,20,60,0.85)");
          grad.addColorStop(1, "rgba(180,0,0,0)");
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          if (s.life <= 0) sandBursts.splice(i, 1);
        } else {
          s.x += s.vx;
          s.y += s.vy;
          s.vy += 0.14;
          s.vx *= 0.99;
          s.life -= s.decay;
          s.rotation += s.spin;

          ctx.save();
          ctx.translate(s.x, s.y);
          ctx.rotate(s.rotation);
          ctx.globalAlpha = Math.max(0, s.life);
          ctx.fillStyle = s.color;
          ctx.fillRect(-s.size / 2, -s.size / 2, s.size, s.size * 0.8);
          ctx.restore();

          if (s.life <= 0 || s.y > height + 10) sandBursts.splice(i, 1);
        }
      }
    }

    function updateAndDrawTrails() {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";

      for (let i = trails.length - 1; i >= 0; i--) {
        const t = trails[i];
        t.life -= 0.018;

        const x2 = t.x + Math.cos(t.angle) * t.length * t.life;
        const y2 = t.y + Math.sin(t.angle) * t.length * t.life;
        const grad = ctx.createLinearGradient(t.x, t.y, x2, y2);
        grad.addColorStop(0, t.colorA);
        grad.addColorStop(0.5, "#ffffff");
        grad.addColorStop(1, t.colorB);

        ctx.globalAlpha = Math.max(0, t.life);
        ctx.strokeStyle = grad;
        ctx.lineWidth = t.width * t.life;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(t.x, t.y);
        ctx.lineTo(x2, y2);
        ctx.stroke();

        if (t.life <= 0) trails.splice(i, 1);
      }

      ctx.restore();
      ctx.globalAlpha = 1;
    }

    function updateAndDrawSparkles() {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";

      for (let i = sparkles.length - 1; i >= 0; i--) {
        const p = sparkles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.05;
        p.vx *= 0.992;
        p.vy *= 0.992;
        p.rotation += p.spin;
        p.life -= p.decay;

        ctx.globalAlpha = Math.max(0, p.life);
        ctx.shadowBlur = 16;
        ctx.shadowColor = p.color;

        if (p.shape === "star") {
          drawStarShape(p.x, p.y, p.size * (0.7 + p.life), p.rotation, p.color);
        } else {
          drawHeart(p.x, p.y, p.size * 2.4 * (0.6 + p.life), p.color, p.rotation);
        }

        if (p.life <= 0) sparkles.splice(i, 1);
      }

      ctx.restore();
      ctx.globalAlpha = 1;
    }

    function drawBackgroundConfetti() {
      for (let i = 0; i < 6; i++) {
        const x = (Math.sin(performance.now() / 900 + i * 2.1) * 0.5 + 0.5) * width;
        const y = (performance.now() / (18 + i * 2) + i * 120) % (height + 120) - 60;
        const color = softColors[i % softColors.length];
        if (i % 2 === 0) drawHeart(x, y, 14 + i * 2, color, performance.now() / 800 + i);
        else drawStarShape(x, y, 9 + i * 1.5, performance.now() / 700 + i, color);
      }
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      drawBackgroundConfetti();
      updateAndDrawUnicorns();
      updateAndDrawHearts();
      updateAndDrawRainbows();
      updateAndDrawSand();
      updateAndDrawTrails();
      updateAndDrawStars();
      updateAndDrawSparkles();
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
