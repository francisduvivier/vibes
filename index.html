<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Links</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 2rem 1.5rem;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 1.5rem;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
    }

    a {
      display: block;
      color: #fff;
      text-decoration: none;
      margin-bottom: 1rem;
      padding: 1rem 1.25rem;
      border: 1px solid #444;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      transition: background 0.2s, border-color 0.2s;
    }

    a:hover,
    a:focus {
      background: rgba(255, 255, 255, 0.12);
      border-color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Links</h1>
    <a href="https://francisduvivier.github.io/eternal-struggle-with-speed-control" target="_blank" rel="noopener noreferrer">Yin Yang Struggle</a>
  </div>
</body>
</html>
